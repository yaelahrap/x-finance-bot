<!DOCTYPE html>
<html lang="en" class="bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x-finance-bot · monitoring</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    [x-cloak] { display: none !important; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar::-webkit-scrollbar-track { background: #1e293b; }
    .scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    .scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

<div x-data="dashboard()" x-init="init()" x-cloak class="max-w-7xl mx-auto p-6">

  <!-- Auth gate -->
  <template x-if="!authed">
    <div class="max-w-md mx-auto mt-32 bg-slate-900 border border-slate-800 rounded-xl p-8">
      <h1 class="text-2xl font-bold mb-2">x-finance-bot</h1>
      <p class="text-slate-400 mb-6 text-sm">Enter your admin API key to continue.</p>
      <form @submit.prevent="login()">
        <input type="password" x-model="apiKeyInput" placeholder="ADMIN_API_KEY"
               class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-emerald-500" autofocus>
        <button class="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-lg py-2 text-sm transition">
          Sign in
        </button>
        <p x-show="loginError" x-text="loginError" class="mt-3 text-sm text-rose-400"></p>
      </form>
    </div>
  </template>

  <!-- Main app -->
  <template x-if="authed">
    <div>

      <!-- Header -->
      <header class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold tracking-tight">x-finance-bot</h1>
          <p class="text-sm text-slate-500" x-text="lastRefresh ? 'Last refresh: ' + relativeTime(lastRefresh) : 'Loading...'"></p>
        </div>
        <div class="flex gap-2">
          <button @click="refresh()" :disabled="loading"
                  class="px-3 py-1.5 text-sm rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 disabled:opacity-50">
            <span x-show="!loading">Refresh</span>
            <span x-show="loading">Loading...</span>
          </button>
          <button @click="logout()"
                  class="px-3 py-1.5 text-sm rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700">
            Sign out
          </button>
        </div>
      </header>

      <!-- Stats grid -->
      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-6">
        <template x-for="card in statCards" :key="card.key">
          <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
            <div class="text-xs uppercase tracking-wider text-slate-500" x-text="card.label"></div>
            <div class="text-2xl font-bold mt-1" :class="card.cls" x-text="stats[card.key] ?? 0"></div>
          </div>
        </template>
      </div>

      <!-- Tabs -->
      <div class="flex gap-1 border-b border-slate-800 mb-4 overflow-x-auto scrollbar">
        <template x-for="tab in tabs" :key="tab.id">
          <button @click="activeTab = tab.id"
                  :class="activeTab === tab.id ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-slate-400 hover:text-slate-200'"
                  class="px-4 py-2 text-sm border-b-2 -mb-px font-medium whitespace-nowrap transition">
            <span x-text="tab.label"></span>
            <span x-show="tab.count !== undefined && tab.count > 0"
                  class="ml-2 inline-block bg-slate-800 text-slate-300 text-xs px-2 py-0.5 rounded-full"
                  x-text="tab.count"></span>
          </button>
        </template>
      </div>

      <!-- Drafts tab (pending/approved/scheduled/rejected) -->
      <template x-if="['pending','approved','scheduled','rejected'].includes(activeTab)">
        <div class="space-y-3">
          <template x-if="!drafts.length">
            <p class="text-slate-500 text-sm py-8 text-center">No <span x-text="activeTab"></span> drafts.</p>
          </template>
          <template x-for="draft in drafts" :key="draft.id">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
              <div class="flex items-start justify-between gap-4 mb-2">
                <div class="flex items-center gap-2 text-xs text-slate-500">
                  <span class="px-2 py-0.5 rounded bg-slate-800 border border-slate-700" x-text="draft.post_type"></span>
                  <span :class="riskClass(parseReview(draft).risk_level)" class="px-2 py-0.5 rounded border"
                        x-text="'risk: ' + (parseReview(draft).risk_level || '?')"></span>
                  <span x-text="'score: ' + (parseScore(draft).total_score ?? '?')"></span>
                  <span x-show="draft.requires_manual_approval" class="text-amber-400">manual</span>
                </div>
                <div class="text-xs text-slate-500" x-text="formatTime(draft.created_at)"></div>
              </div>

              <div class="text-sm whitespace-pre-wrap leading-relaxed mb-3" x-text="draft.content"></div>

              <details x-show="parseReview(draft).why_it_matters || draft.thread_json" class="text-xs text-slate-400 mb-3">
                <summary class="cursor-pointer hover:text-slate-200">Details</summary>
                <div class="mt-2 space-y-2 pl-2 border-l-2 border-slate-800">
                  <div x-show="parseReview(draft).why_it_matters">
                    <span class="text-slate-500">Why it matters:</span>
                    <span x-text="parseReview(draft).why_it_matters"></span>
                  </div>
                  <div x-show="parseReview(draft).source_notes">
                    <span class="text-slate-500">Source:</span>
                    <span x-text="parseReview(draft).source_notes"></span>
                  </div>
                  <div x-show="draft.scheduled_at">
                    <span class="text-slate-500">Scheduled:</span>
                    <span x-text="formatTime(draft.scheduled_at)"></span>
                  </div>
                  <div x-show="draft.published_at">
                    <span class="text-slate-500">Published:</span>
                    <span x-text="formatTime(draft.published_at)"></span>
                  </div>
                </div>
              </details>

              <div class="flex flex-wrap gap-2" x-show="['pending','approved'].includes(activeTab)">
                <button @click="approve(draft.id)" x-show="activeTab === 'pending'"
                        class="px-3 py-1.5 text-xs rounded bg-emerald-600 hover:bg-emerald-500 text-white">
                  Approve
                </button>
                <button @click="reject(draft.id)" x-show="activeTab === 'pending'"
                        class="px-3 py-1.5 text-xs rounded bg-rose-600 hover:bg-rose-500 text-white">
                  Reject
                </button>
                <button @click="openSchedule(draft)" x-show="['pending','approved'].includes(activeTab)"
                        class="px-3 py-1.5 text-xs rounded bg-slate-700 hover:bg-slate-600 text-white">
                  Schedule
                </button>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- Published tab -->
      <template x-if="activeTab === 'published'">
        <div class="space-y-3">
          <template x-if="!published.length">
            <p class="text-slate-500 text-sm py-8 text-center">No published posts yet.</p>
          </template>
          <template x-for="post in published" :key="post.id">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
              <div class="flex items-start justify-between gap-4 mb-2">
                <div class="flex items-center gap-2 text-xs">
                  <span :class="post.status === 'success' ? 'bg-emerald-900 text-emerald-300 border-emerald-800' : 'bg-rose-900 text-rose-300 border-rose-800'"
                        class="px-2 py-0.5 rounded border" x-text="post.status"></span>
                  <span class="text-slate-500" x-text="'X ID: ' + (post.x_post_id || '—')"></span>
                </div>
                <div class="text-xs text-slate-500" x-text="formatTime(post.published_at)"></div>
              </div>
              <div class="text-sm whitespace-pre-wrap leading-relaxed" x-text="post.content"></div>
              <a x-show="post.x_post_id" :href="'https://x.com/i/status/' + post.x_post_id" target="_blank"
                 class="mt-2 inline-block text-xs text-emerald-400 hover:text-emerald-300">
                Open on X →
              </a>
            </div>
          </template>
        </div>
      </template>

      <!-- Articles tab -->
      <template x-if="activeTab === 'articles'">
        <div class="space-y-2">
          <template x-if="!articles.length">
            <p class="text-slate-500 text-sm py-8 text-center">No articles fetched yet.</p>
          </template>
          <template x-for="art in articles" :key="art.id">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex items-start justify-between gap-4">
              <div class="min-w-0 flex-1">
                <div class="flex items-center gap-2 text-xs text-slate-500 mb-1">
                  <span class="px-2 py-0.5 rounded bg-slate-800 border border-slate-700" x-text="art.category || 'unknown'"></span>
                  <span :class="articleStatusClass(art.status)" class="px-2 py-0.5 rounded border" x-text="art.status"></span>
                </div>
                <a :href="art.url" target="_blank" class="text-sm hover:text-emerald-400 line-clamp-2" x-text="art.title"></a>
              </div>
              <div class="text-xs text-slate-500 whitespace-nowrap shrink-0" x-text="relativeTime(art.fetched_at)"></div>
            </div>
          </template>
        </div>
      </template>

      <!-- Sources tab -->
      <template x-if="activeTab === 'sources'">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <template x-for="src in sources" :key="src.id">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
              <div class="flex items-start justify-between gap-2 mb-2">
                <div class="font-medium text-sm" x-text="src.name"></div>
                <span class="text-xs text-slate-500">★ <span x-text="src.reliability_score"></span>/10</span>
              </div>
              <div class="flex gap-2 text-xs text-slate-500 mb-2">
                <span class="px-2 py-0.5 rounded bg-slate-800 border border-slate-700" x-text="src.type"></span>
                <span class="px-2 py-0.5 rounded bg-slate-800 border border-slate-700" x-text="src.category"></span>
              </div>
              <a :href="src.url" target="_blank" class="text-xs text-slate-400 hover:text-emerald-400 break-all" x-text="src.url"></a>
            </div>
          </template>
        </div>
      </template>

    </div>
  </template>

  <!-- Schedule modal -->
  <div x-show="scheduleDraft" @click.self="scheduleDraft = null"
       class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" x-cloak>
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 w-full max-w-md">
      <h3 class="text-lg font-bold mb-2">Schedule draft</h3>
      <p class="text-sm text-slate-400 mb-4">Pick when this should publish (your local time).</p>
      <input type="datetime-local" x-model="scheduleAt"
             class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
      <div class="flex justify-end gap-2 mt-5">
        <button @click="scheduleDraft = null" class="px-4 py-2 text-sm rounded-lg bg-slate-800 hover:bg-slate-700">Cancel</button>
        <button @click="confirmSchedule()" class="px-4 py-2 text-sm rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white">Schedule</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div x-show="toast.message" x-transition.opacity
       :class="toast.type === 'error' ? 'bg-rose-900 border-rose-800' : 'bg-emerald-900 border-emerald-800'"
       class="fixed bottom-6 right-6 border rounded-lg px-4 py-3 text-sm shadow-xl" x-cloak>
    <span x-text="toast.message"></span>
  </div>

</div>

<script>
function dashboard() {
  return {
    apiKey: localStorage.getItem('x-finance-bot-api-key') || '',
    apiKeyInput: '',
    authed: false,
    loginError: '',
    loading: false,
    lastRefresh: null,

    activeTab: 'pending',
    stats: {},
    drafts: [],
    published: [],
    articles: [],
    sources: [],

    scheduleDraft: null,
    scheduleAt: '',

    toast: { message: '', type: 'success' },

    statCards: [
      { key: 'drafts_pending',    label: 'Pending',    cls: 'text-amber-400' },
      { key: 'drafts_approved',   label: 'Approved',   cls: 'text-emerald-400' },
      { key: 'drafts_scheduled',  label: 'Scheduled',  cls: 'text-sky-400' },
      { key: 'drafts_published',  label: 'Published',  cls: 'text-emerald-400' },
      { key: 'drafts_rejected',   label: 'Rejected',   cls: 'text-rose-400' },
      { key: 'published_failed',  label: 'Failed',     cls: 'text-rose-500' },
      { key: 'articles',          label: 'Articles',   cls: 'text-slate-200' },
      { key: 'sources',           label: 'Sources',    cls: 'text-slate-200' },
    ],

    get tabs() {
      return [
        { id: 'pending',   label: 'Pending',   count: this.stats.drafts_pending },
        { id: 'approved',  label: 'Approved',  count: this.stats.drafts_approved },
        { id: 'scheduled', label: 'Scheduled', count: this.stats.drafts_scheduled },
        { id: 'rejected',  label: 'Rejected',  count: this.stats.drafts_rejected },
        { id: 'published', label: 'Published', count: this.stats.drafts_published },
        { id: 'articles',  label: 'Articles',  count: this.stats.articles },
        { id: 'sources',   label: 'Sources',   count: this.stats.sources },
      ];
    },

    init() {
      if (this.apiKey) {
        this.authed = true;
        this.refresh();
        setInterval(() => { if (this.authed) this.refresh(); }, 30000);
      }
      this.$watch('activeTab', () => this.loadActive());
    },

    async login() {
      this.apiKey = this.apiKeyInput.trim();
      if (!this.apiKey) return;
      try {
        await this.api('/api/stats');
        localStorage.setItem('x-finance-bot-api-key', this.apiKey);
        this.authed = true;
        this.loginError = '';
        this.refresh();
      } catch (e) {
        this.loginError = 'Invalid API key';
        this.apiKey = '';
      }
    },

    logout() {
      localStorage.removeItem('x-finance-bot-api-key');
      this.apiKey = '';
      this.authed = false;
    },

    async api(path, opts = {}) {
      const headers = { 'Authorization': 'Bearer ' + this.apiKey };
      if (opts.body) headers['Content-Type'] = 'application/json';
      const resp = await fetch(path, { ...opts, headers });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${resp.status}`);
      }
      return resp.json();
    },

    async refresh() {
      this.loading = true;
      try {
        const [stats] = await Promise.all([
          this.api('/api/stats'),
          this.loadActive(),
        ]);
        this.stats = stats;
        this.lastRefresh = new Date();
      } catch (e) {
        this.showToast(e.message, 'error');
      } finally {
        this.loading = false;
      }
    },

    async loadActive() {
      try {
        if (['pending','approved','scheduled','rejected'].includes(this.activeTab)) {
          this.drafts = await this.api(`/api/drafts?status=${this.activeTab}&limit=200`);
        } else if (this.activeTab === 'published') {
          this.published = await this.api('/api/published');
        } else if (this.activeTab === 'articles') {
          this.articles = await this.api('/api/articles?limit=100');
        } else if (this.activeTab === 'sources') {
          this.sources = await this.api('/api/sources');
        }
      } catch (e) {
        this.showToast(e.message, 'error');
      }
    },

    async approve(id) {
      try {
        await this.api(`/api/drafts/${id}/approve`, { method: 'POST' });
        this.showToast('Approved');
        this.refresh();
      } catch (e) { this.showToast(e.message, 'error'); }
    },

    async reject(id) {
      if (!confirm('Reject this draft?')) return;
      try {
        await this.api(`/api/drafts/${id}/reject`, { method: 'POST' });
        this.showToast('Rejected');
        this.refresh();
      } catch (e) { this.showToast(e.message, 'error'); }
    },

    openSchedule(draft) {
      this.scheduleDraft = draft;
      const now = new Date(Date.now() + 5 * 60 * 1000);
      this.scheduleAt = now.toISOString().slice(0, 16);
    },

    async confirmSchedule() {
      if (!this.scheduleAt) return;
      const at = new Date(this.scheduleAt).toISOString();
      try {
        await this.api(`/api/drafts/${this.scheduleDraft.id}/schedule`, {
          method: 'POST',
          body: JSON.stringify({ scheduled_at: at }),
        });
        this.showToast('Scheduled');
        this.scheduleDraft = null;
        this.refresh();
      } catch (e) { this.showToast(e.message, 'error'); }
    },

    parseReview(d) {
      try { return d.review_json ? JSON.parse(d.review_json) : {}; }
      catch { return {}; }
    },

    parseScore(d) {
      try { return d.score_json ? JSON.parse(d.score_json) : {}; }
      catch { return {}; }
    },

    riskClass(level) {
      switch (level) {
        case 'low':    return 'bg-emerald-900 text-emerald-300 border-emerald-800';
        case 'medium': return 'bg-amber-900 text-amber-300 border-amber-800';
        case 'high':   return 'bg-rose-900 text-rose-300 border-rose-800';
        default:       return 'bg-slate-800 text-slate-400 border-slate-700';
      }
    },

    articleStatusClass(s) {
      switch (s) {
        case 'published': return 'bg-emerald-900 text-emerald-300 border-emerald-800';
        case 'drafted':   return 'bg-sky-900 text-sky-300 border-sky-800';
        case 'skipped':   return 'bg-slate-800 text-slate-400 border-slate-700';
        case 'scored':    return 'bg-amber-900 text-amber-300 border-amber-800';
        default:          return 'bg-slate-800 text-slate-400 border-slate-700';
      }
    },

    formatTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString();
    },

    relativeTime(iso) {
      if (!iso) return '—';
      const d = typeof iso === 'string' ? new Date(iso) : iso;
      const sec = Math.floor((Date.now() - d.getTime()) / 1000);
      if (sec < 60)  return `${sec}s ago`;
      if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
      if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
      return `${Math.floor(sec/86400)}d ago`;
    },

    showToast(message, type = 'success') {
      this.toast = { message, type };
      setTimeout(() => { this.toast.message = ''; }, 3000);
    },
  };
}
</script>
</body>
</html>
