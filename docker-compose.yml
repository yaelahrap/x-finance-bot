services:
  bot:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bot-data:
